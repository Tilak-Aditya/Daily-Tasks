<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>QUIZ</title>
        <link rel="stylesheet" href="index.css" /> 
    <!--boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--fontawesome-->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" /> 
</head>
<body>

    <h1>WEB DEVELOPMENT QUIZ</h1>
  
<div class="quizCardContainer">

  <!-- Progress Bar -->
  <div class="progress-bar">
      <div class="progress" id="progress"></div>
  </div>

  <div class="TimerSection">
    <p>Question <span id="currentQuestion">1</span> / 10</p>
    <p>Time : <span id="timer"> 00:00</span></p>
  </div>

  <div class="questionContainer">
     <p id="question">Question text here</p>
  </div>

  <div class="optionsContainer">
     <button class="option" data-index="0"></button>
     <button class="option" data-index="1"></button>
     <button class="option" data-index="2"></button>
     <button class="option" data-index="3"></button>
  </div>

  <div class="buttonSection">
      <button id="nextBtn" class="actionBtn">Next</button>
      <button id="submitBtn" class="actionBtn submitBtn">Submit</button>
  </div>
  <div id="reportCard" class="reportCard hidden">
    <h2>Quiz Completed </h2>
    <p>Your Final Score:</p>
    <h3 id="finalScore">0 / 10</h3>
    <button id="retryBtn" class="actionBtn" style="width:150px;">Retry Quiz</button>
    <button onclick="logoutBtn()" class="actionBtn submitBtn" style="width:150px;">Log Out</button>
</div>

</div>


        <script src="index.js"></script>
    </body>
</html>
